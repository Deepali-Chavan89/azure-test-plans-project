trigger:
- main

pool:
  vmImage: ubuntu-latest

# ---------------------------------------------------------------------------
# Pipeline variables
# ---------------------------------------------------------------------------
# $(System.AccessToken) is the built-in pipeline identity token.
# Grant it "Test Plans – Read & Write" and "Work Items – Read & Write" under:
#   Project Settings → Pipelines → <pipeline name> → Security
#
# To use a Personal Access Token (PAT) instead, add a secret pipeline variable
# named ADO_PAT (mark it as "secret") and reference it as $(ADO_PAT) below.
# ---------------------------------------------------------------------------

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.x'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: Install Dependencies

- script: |
    pytest tests/ --junitxml=test-results.xml
  displayName: Execute Selenium Tests
  env:
    # Built-in token – no extra secrets needed.
    # Replace with $(ADO_PAT) if you prefer a dedicated PAT.
    ADO_PAT: $(System.AccessToken)
    ADO_ORG_URL: https://dev.azure.com/atul-kamble
    ADO_PROJECT: project
    ADO_TEST_PLAN_NAME: WebApp Testing
    ADO_TEST_SUITE_NAME: Automated Tests
    # ADO_AREA_PATH defaults to ADO_PROJECT value ("project") which is owned
    # by the project's default team. Override here only if your team uses a
    # custom area path, e.g. "project\MyTeam".
    ADO_AREA_PATH: project

- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results.xml'
    failTaskOnFailedTests: true
